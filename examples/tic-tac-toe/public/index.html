<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe - RoomService Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🎮 Tic-Tac-Toe</h1>
    <p class="subtitle">Real-time multiplayer with RoomService</p>

    <!-- Join/Create Screen -->
    <div id="join-screen">
      <div class="card">
        <h2>Join a Game</h2>
        <div class="input-group">
          <label>Your Name:</label>
          <input type="text" id="player-name" placeholder="Enter your name" value="Player">
        </div>
        <div class="input-group">
          <label>Room ID (optional):</label>
          <input type="text" id="room-id-input" placeholder="Leave empty to create new room">
        </div>
        <div class="button-group">
          <button class="btn btn-primary" id="join-btn" onclick="joinOrCreateRoom()">Join Game</button>
        </div>
        <p class="hint">Leave Room ID empty to create a new room</p>
      </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden">
      <div class="game-info">
        <div class="info-card">
          <span class="label">Room ID:</span>
          <code id="room-id-display"></code>
          <button class="btn-copy" onclick="copyRoomId()" title="Copy Room ID">📋</button>
        </div>
        <div class="info-card">
          <span class="label">You are:</span>
          <span id="player-symbol" class="symbol-display"></span>
        </div>
        <div class="info-card">
          <span class="label">Status:</span>
          <span id="game-status"></span>
        </div>
      </div>

      <div class="status-message" id="status-message"></div>

      <div class="board" id="board">
        <!-- Cells will be generated by JS -->
      </div>

      <div class="players-list" id="players-list">
        <!-- Players will be listed here -->
      </div>

      <div class="controls">
        <button class="btn btn-secondary" onclick="copyRoomId()">Share Room ID</button>
        <button class="btn btn-secondary" onclick="resetGame()">Reset Game</button>
        <button class="btn btn-danger" onclick="leaveRoom()">Leave Room</button>
      </div>
    </div>
  </div>

  <script>
    // API Base URL
    const API_BASE = window.location.origin + '/api';

    // Generate or get persistent user ID
    function getOrCreateUserId() {
      let userId = localStorage.getItem('tictactoe_userId');
      if (!userId) {
        userId = 'player-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('tictactoe_userId', userId);
      }
      return userId;
    }

    // Save current session
    function saveSession() {
      if (currentRoomId) {
        localStorage.setItem('tictactoe_roomId', currentRoomId);
        localStorage.setItem('tictactoe_userName', myUserName);
        localStorage.setItem('tictactoe_symbol', mySymbol);
      }
    }

    // Clear session
    function clearSession() {
      localStorage.removeItem('tictactoe_roomId');
      localStorage.removeItem('tictactoe_userName');
      localStorage.removeItem('tictactoe_symbol');
    }

    // Game state
    let myUserId = getOrCreateUserId();
    let myUserName = '';
    let mySymbol = null;
    let currentRoomId = null;
    let board = [];
    let currentPlayer = 'X';
    let gameStatus = 'waiting';
    let winner = null;
    let players = [];
    let pollInterval = null;

    // Initialize board UI
    function initBoard() {
      const boardEl = document.getElementById('board');
      boardEl.innerHTML = '';
      for (let i = 0; i < 9; i++) {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.onclick = () => makeMove(i);
        boardEl.appendChild(cell);
      }
    }

    // Update board display
    function updateBoard() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, index) => {
        cell.textContent = board[index] || '';
        cell.className = 'cell';
        if (board[index]) {
          cell.classList.add('occupied', board[index].toLowerCase());
        }
        // Disable cell if: already occupied, game not playing, OR not my turn
        cell.disabled = board[index] !== '' || gameStatus !== 'playing' || currentPlayer !== mySymbol;
      });
    }

    // Update status display
    function updateStatus() {
      const statusEl = document.getElementById('game-status');
      const messageEl = document.getElementById('status-message');

      if (gameStatus === 'waiting') {
        statusEl.textContent = '⏳ Waiting for opponent...';
        messageEl.textContent = 'Share the Room ID with a friend!';
        messageEl.className = 'status-message info';
      } else if (gameStatus === 'playing') {
        if (currentPlayer === mySymbol) {
          statusEl.textContent = `🎯 Your turn (${mySymbol})`;
          messageEl.textContent = 'Click a cell to make your move';
          messageEl.className = 'status-message success';
        } else {
          statusEl.textContent = `⏳ ${currentPlayer}'s turn`;
          messageEl.textContent = 'Waiting for opponent...';
          messageEl.className = 'status-message info';
        }
      } else if (gameStatus === 'finished') {
        if (winner === 'draw') {
          statusEl.textContent = "🤝 It's a draw!";
          messageEl.textContent = 'Good game!';
          messageEl.className = 'status-message';
        } else if (winner === mySymbol) {
          statusEl.textContent = '🎉 You won!';
          messageEl.textContent = 'Congratulations!';
          messageEl.className = 'status-message success';
        } else {
          statusEl.textContent = '😢 You lost!';
          messageEl.textContent = 'Better luck next time!';
          messageEl.className = 'status-message';
        }
      }
    }

    // Update players list
    function updatePlayersList() {
      const listEl = document.getElementById('players-list');
      listEl.innerHTML = '';

      players.forEach(player => {
        const playerEl = createPlayerElement(player.symbol, player);
        listEl.appendChild(playerEl);
      });
    }

    function createPlayerElement(symbol, player) {
      const div = document.createElement('div');
      div.className = 'player-card';
      const isMe = player.id === myUserId;
      div.innerHTML = `
        <span class="player-symbol ${symbol.toLowerCase()}">${symbol}</span>
        <span class="player-name">${player.name} ${isMe ? '(You)' : ''}</span>
      `;
      return div;
    }

    // Poll for game state updates
    async function pollGameState() {
      if (!currentRoomId || !myUserId) return;

      try {
        const response = await fetch(`${API_BASE}/room/${currentRoomId}?userId=${myUserId}`);
        if (!response.ok) {
          // If we get a 404 or similar, we might have been removed from the room
          if (response.status === 404 || response.status === 403) {
            console.error('No longer in room');
            stopPolling();
            return;
          }
          throw new Error('Failed to get room state');
        }

        const data = await response.json();

        // Update local state
        if (JSON.stringify(data.board) !== JSON.stringify(board)) {
          board = data.board;
          updateBoard();
        }

        if (data.currentPlayer !== currentPlayer) {
          currentPlayer = data.currentPlayer;
          updateStatus();
          updateBoard(); // Re-enable/disable cells based on new turn
        }

        if (data.gameStatus !== gameStatus) {
          gameStatus = data.gameStatus;
          updateStatus();
          updateBoard(); // Re-enable/disable cells based on game status
        }

        if (data.winner !== winner) {
          winner = data.winner || null; // Convert empty string to null
          updateStatus();
        }

        // Use RoomService's built-in users list, not our custom players field
        // Extract player info with symbol from metadata
        const serverUsers = data.users || [];
        const playersFromServer = serverUsers.map(u => ({
          id: u.id,
          name: u.name,
          symbol: u.metadata?.symbol || ''
        }));

        // Update if something changed (including user leaving)
        if (JSON.stringify(playersFromServer) !== JSON.stringify(players)) {
          players = playersFromServer;
          updatePlayersList();
        }
      } catch (error) {
        console.error('Error polling game state:', error);
        // Stop polling if we get repeated errors
        if (error.message.includes('room does not exist') || error.message.includes('not in room')) {
          stopPolling();
        }
      }
    }

    function stopPolling() {
      if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
      }
    }

    // Make a move
    async function makeMove(index) {
      if (!currentRoomId || !myUserId) return;
      if (gameStatus !== 'playing') return;
      if (currentPlayer !== mySymbol) return;
      if (board[index] !== '') return;

      try {
        const response = await fetch(`${API_BASE}/room/${currentRoomId}/move`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: myUserId,
            index: index,
            symbol: mySymbol
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || 'Failed to make move');
        }

        const data = await response.json();
        board = data.board;
        currentPlayer = data.currentPlayer;
        gameStatus = data.gameStatus;
        winner = data.winner || null; // Convert empty string to null

        updateBoard();
        updateStatus();

        // Poll immediately after our move to get quick updates
        setTimeout(pollGameState, 100);
      } catch (error) {
        console.error('Error making move:', error);
        if (error.message.includes('room does not exist') || error.message.includes('not in room')) {
          alert('You are no longer in this room. Please create or join a new game.');
          leaveRoom();
        } else {
          alert('Error: ' + error.message);
        }
      }
    }

    // Reset the game
    async function resetGame() {
      if (!currentRoomId || !myUserId) {
        console.error('Cannot reset: not in a room');
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/room/${currentRoomId}/reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: myUserId })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || 'Failed to reset game');
        }

        // Fetch new state
        await pollGameState();
      } catch (error) {
        console.error('Error resetting game:', error);
        // If room doesn't exist, we might have been disconnected - just show a friendly message
        if (error.message.includes('room does not exist') || error.message.includes('not in room')) {
          alert('You are no longer in this room. Please create or join a new game.');
          leaveRoom();
        } else {
          alert('Error: ' + error.message);
        }
      }
    }

    // Copy room ID to clipboard
    function copyRoomId() {
      navigator.clipboard.writeText(currentRoomId).then(() => {
        const btn = document.querySelector('.btn-copy');
        const original = btn.textContent;
        btn.textContent = '✅';
        setTimeout(() => btn.textContent = original, 1500);
      });
    }

    // Leave room
    async function leaveRoom() {
      // Stop polling first
      stopPolling();

      // Call server to leave the room (don't wait for it)
      if (currentRoomId && myUserId) {
        fetch(`${API_BASE}/room/${currentRoomId}/leave`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: myUserId })
        }).catch(err => {
          console.error('Error leaving room (non-critical):', err);
        });
      }

      // Clear session and reset state
      clearSession();

      // Reset UI and state immediately
      document.getElementById('join-screen').classList.remove('hidden');
      document.getElementById('game-screen').classList.add('hidden');

      myUserId = getOrCreateUserId(); // Get fresh user ID for next game
      mySymbol = null;
      currentRoomId = null;
      board = [];
      players = [];
      gameStatus = 'waiting';
      currentPlayer = 'X';
      winner = null;
    }

    // Join or create room
    async function joinOrCreateRoom() {
      const nameInput = document.getElementById('player-name');
      const roomIdInput = document.getElementById('room-id-input');
      const joinBtn = document.getElementById('join-btn');

      myUserName = nameInput.value.trim() || 'Player';
      const roomIdInputValue = roomIdInput.value.trim();

      joinBtn.disabled = true;
      joinBtn.textContent = 'Connecting...';

      try {
        let data;

        if (roomIdInputValue) {
          // Join existing room
          const response = await fetch(`${API_BASE}/room/${roomIdInputValue}/join`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ playerName: myUserName, userId: myUserId })
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to join room');
          }

          data = await response.json();
          currentRoomId = roomIdInputValue;
        } else {
          // Create new room
          const response = await fetch(`${API_BASE}/room/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ playerName: myUserName, userId: myUserId })
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to create room');
          }

          data = await response.json();
          currentRoomId = data.roomId;
        }

        // Update user ID (in case server assigned a different one)
        myUserId = data.userId;
        mySymbol = data.symbol;
        board = data.board || Array(9).fill('');
        currentPlayer = data.currentPlayer || 'X';
        gameStatus = data.gameStatus || 'waiting';
        winner = data.winner || null;
        players = data.players || [];

        // Save session for reconnection
        saveSession();

        // Update UI
        document.getElementById('join-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('room-id-display').textContent = currentRoomId;
        document.getElementById('player-symbol').textContent = mySymbol;
        document.getElementById('player-symbol').className = 'symbol-display ' + mySymbol.toLowerCase();

        initBoard();
        updateBoard();
        updateStatus();
        updatePlayersList();

        // Start polling for updates
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(pollGameState, 500);

      } catch (error) {
        console.error('Error joining room:', error);
        alert('Error: ' + error.message);
        joinBtn.disabled = false;
        joinBtn.textContent = 'Join Game';
      }
    }

    // Enter game UI directly with existing state
    function enterGameUI(data, roomId) {
      currentRoomId = roomId;
      myUserId = data.userId;
      mySymbol = data.symbol;
      board = data.board || Array(9).fill('');
      currentPlayer = data.currentPlayer || 'X';
      gameStatus = data.gameStatus || 'waiting';
      winner = data.winner || null;
      players = data.players || [];

      // Save session
      saveSession();

      // Update UI
      document.getElementById('join-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('room-id-display').textContent = currentRoomId;
      document.getElementById('player-symbol').textContent = mySymbol;
      document.getElementById('player-symbol').className = 'symbol-display ' + mySymbol.toLowerCase();

      initBoard();
      updateBoard();
      updateStatus();
      updatePlayersList();

      // Start polling for updates
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(pollGameState, 500);
    }

    // Initialize on load - check for existing session
    window.addEventListener('load', async () => {
      initBoard();

      // Check if user was already in a room
      const savedRoomId = localStorage.getItem('tictactoe_roomId');
      const savedUserName = localStorage.getItem('tictactoe_userName');

      if (savedRoomId && savedUserName) {
        // Try to reconnect
        try {
          const response = await fetch(`${API_BASE}/room/${savedRoomId}/join`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ playerName: savedUserName, userId: myUserId })
          });

          if (response.ok) {
            const data = await response.json();
            enterGameUI(data, savedRoomId);
            return;
          }
        } catch (error) {
          console.error('Failed to reconnect:', error);
        }
        // If reconnection failed, clear the session
        clearSession();
      }
    });

    // Expose functions to global scope
    window.joinOrCreateRoom = joinOrCreateRoom;
    window.makeMove = makeMove;
    window.resetGame = resetGame;
    window.copyRoomId = copyRoomId;
    window.leaveRoom = leaveRoom;
  </script>
</body>
</html>
